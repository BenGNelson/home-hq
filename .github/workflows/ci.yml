name: CI

# Prove a clean clone builds and passes on every push / PR to main. Runs the
# exact same gates as the local loop: unit suites, a prod build, and the e2e
# smoke against the running stack — no host toolchain, everything in containers.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Minimal config: every host-specific value is optional, so the app boots
      # with the committed example .env and each module self-hides or degrades
      # to its "not configured" state. This is exactly the clean-clone path.
      - name: Configure (.env from the committed example)
        run: cp .env.example .env

      # Build backend, frontend (prod), and frontend-dev (for the Vitest runner).
      - name: Build images
        run: docker compose --profile dev build

      - name: Unit tests (pytest + Vitest)
        run: scripts/test.sh

      - name: Start the stack
        run: docker compose up -d frontend backend

      - name: Wait for the app to answer
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS http://localhost:5173/ >/dev/null 2>&1; then exit 0; fi
            sleep 2
          done
          echo "::error::app did not come up"; exit 1

      - name: E2e smoke
        run: scripts/verify.sh

      - name: Container logs on failure
        if: failure()
        run: docker compose logs --no-color --tail 200
