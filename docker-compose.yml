# Home HQ — service definitions.
# This file is committed to git and contains NO secrets: every host-specific
# value is a ${VAR} pulled from .env at runtime. Compose auto-loads ./.env.

# Cap every container's logs so a misbehaving service can't fill the disk with
# stdout. Docker's default json-file driver is UNBOUNDED; this rotates at
# 10 MB × 3 files per container. Applied to each service via *default-logging.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  backend:
    build: ./backend
    container_name: home-hq-backend
    security_opt:
      - no-new-privileges:true  # defense-in-depth — the most attack-reachable service
    # Inject all the .env values as environment variables in the container,
    # so config.py (pydantic-settings) reads them at startup.
    env_file: .env
    # Reach the Docker API through the read-only socket proxy (below) instead of
    # mounting the raw socket — so a backend compromise can't drive Docker (create
    # privileged containers, mount the host FS, escape). docker.from_env() picks
    # up DOCKER_HOST automatically, so no app code changes.
    environment:
      DOCKER_HOST: "tcp://docker-socket-proxy:2375"
    depends_on:
      - docker-socket-proxy
    networks:
      - default        # talk to frontend + reach the LAN/internet (Plex, printer)
      - docker-proxy   # reach the socket proxy by name, on an isolated network
    ports:
      # host:container — reach the API at http://<your-host>:${API_PORT}
      - "${API_PORT}:8000"
    volumes:
      # (Docker access is via the docker-socket-proxy service — see DOCKER_HOST
      # above — not a raw socket mount here.)
      # RAID mount, read-only — lets /api/disk report real usage for the array.
      - "${RAID_MOUNT}:${RAID_MOUNT}:ro"
      # Host /proc, read-only — lets /api/network read host interface counters
      # (PID 1's net namespace). Exposes only counters + interface names.
      - "/proc:/host/proc:ro"
      # Persistent SQLite cache for the Plex library browser.
      - "homehq-data:/data"
      # SMART health JSON written by the host timer (scripts/smart-health.py),
      # read-only — the container never runs smartctl itself.
      - "${SMART_DIR:-/var/lib/home-hq}:/smart:ro"
      # The project README + its screenshots, read-only — powers the in-app
      # README viewer (/api/readme). A live view of the real files, no copy.
      # Mounted under /readme (NOT /app): the test runner bind-mounts ./backend
      # over /app, and a nested mount target there would make Docker create a
      # stray host file at the mount source.
      - "./README.md:/readme/README.md:ro"
      - "./docs:/readme/docs:ro"
      # The host's server guide, read-only — powers the in-app Server Guide page.
      # Defaults to the committed example template; set SERVER_GUIDE_FILE in .env
      # to point at your own (gitignored, host-specific) guide instead. No host
      # path is ever committed — only the generic default lives here.
      - "${SERVER_GUIDE_FILE:-./docs/SERVER_GUIDE.example.md}:/srv-guide/SERVER_GUIDE.md:ro"
    restart: unless-stopped
    logging: *default-logging

  # --- docker-socket-proxy: a locked-down gateway to the Docker API. ---
  # The backend needs to LIST containers + read stats, but mounting the raw
  # socket would hand it full control of the host's Docker (create privileged
  # containers, mount the host filesystem, escape). This tiny HAProxy-based
  # proxy holds the socket and exposes ONLY read-only container endpoints
  # (CONTAINERS=1, POST=0 → no writes) on an internal network the backend reaches
  # by name. Pinned by digest and kept off Watchtower since it's security-critical.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0@sha256:9e4b9e7517a6b660f2cc903a19b257b1852d5b3344794e3ea334ff00ae677ac2
    container_name: home-hq-docker-proxy
    environment:
      CONTAINERS: 1   # allow GET /containers/* (list, inspect, stats)
      POST: 0         # read-only: deny every write (create/start/stop/exec/...)
    volumes:
      - "${DOCKER_SOCKET}:/var/run/docker.sock:ro"
    networks:
      - docker-proxy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  # --- frontend: production build served by nginx (the always-on face). ---
  # Multi-stage build → static PWA behind nginx, which also proxies /api to the
  # backend, so the browser sees one origin. This is what `tailscale serve`
  # fronts (host port 5173). For hot-reload development use the "dev" profile
  # (frontend-dev below).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: home-hq-frontend
    security_opt:
      - no-new-privileges:true
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    # Wait for the backend to be HEALTHY (not just started) before nginx comes
    # up, so the first request can't hit a backend that's still booting. Relies
    # on the backend's HEALTHCHECK (see backend/Dockerfile).
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging

  # --- frontend-dev: Vite dev server with hot reload (opt-in). ---
  # Only starts with `docker compose --profile dev up frontend-dev`. Listens on
  # host port 5174 so it can run alongside the production frontend; reach it by
  # LAN IP:5174 while iterating. Source is bind-mounted for live reload.
  frontend-dev:
    profiles: ["dev"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: home-hq-frontend-dev
    env_file: .env
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app          # live source for hot reload
      - /app/node_modules        # keep the image's deps; don't shadow with host
    depends_on:
      - backend
    restart: unless-stopped
    logging: *default-logging

networks:
  # Isolated network between the backend and the Docker socket proxy. `internal`
  # = no route to the outside world, so the proxy can only ever be reached from
  # within this compose project (the backend), never the host or the LAN.
  docker-proxy:
    internal: true

volumes:
  homehq-data:
