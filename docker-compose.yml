# Home HQ — service definitions.
# This file is committed to git and contains NO secrets: every host-specific
# value is a ${VAR} pulled from .env at runtime. Compose auto-loads ./.env.

services:
  backend:
    build: ./backend
    container_name: home-hq-backend
    # Inject all the .env values as environment variables in the container,
    # so config.py (pydantic-settings) reads them at startup.
    env_file: .env
    ports:
      # host:container — reach the API at http://<your-host>:${API_PORT}
      - "${API_PORT}:8000"
    volumes:
      # Docker socket — lets /api/containers query the host's containers.
      # NOTE: ":ro" protects the socket *file*, but the Docker API over a
      # unix socket is not truly read-only. A docker-socket-proxy is the
      # proper hardening step — we'll add that later (see plan §7 guardrails).
      - "${DOCKER_SOCKET}:/var/run/docker.sock:ro"
      # RAID mount, read-only — lets /api/disk report real usage for the array.
      - "${RAID_MOUNT}:${RAID_MOUNT}:ro"
    restart: unless-stopped

