<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Library — Player</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
      #game { width: 100%; height: 100%; }
      #msg { color: #cbd5e1; font-family: system-ui, sans-serif; padding: 1.25rem; line-height: 1.5; }
      #msg code { background: #1e293b; padding: 0 0.3em; border-radius: 0.25em; }
      /* The engine styles its save/load notifications red; tone it down. */
      .ejs_message { color: #e2e8f0 !important; text-shadow: 0 1px 2px #000 !important; }
      /* ---- On-screen touch controller tuning (all overrides live here, not in
         the vendored emulatorjs/ CSS which gets overwritten on re-fetch) ---- */
      :root {
        --ejs-gamepad-lift: 70px; /* how far to raise the whole pad */
        --ejs-dpad-size: 165px;   /* dpad footprint (default engine value: 125px) */
        --ejs-btn-scale: 1.3;     /* round A/B face-button size multiplier */
        --ejs-block-scale: 1.1;   /* Start/Select pill multiplier (smaller than
                                     the round buttons so the two center pills,
                                     which sit edge-to-edge at 1.3, keep a gap) */
        --ejs-ff-right: 14px;     /* fast-forward toggle inset from the right */
        --ejs-ff-gap: 14px;       /* gap between the FF toggle and the cluster */
      }
      /* Lift the pad off the bottom edge so buttons are in thumb reach and clear
         the iOS home indicator. The dpad / face-button / Start-Select zones are
         all children of this parent, so raising the parent moves the whole pad
         uniformly — no per-system layout override needed. */
      .ejs_virtualGamepad_parent {
        bottom: calc(50px + var(--ejs-gamepad-lift) + env(safe-area-inset-bottom, 0px)) !important;
      }
      /* Bigger dpad. It fills its zone, so we resize the zone with REAL pixels
         (not transform) because the dpad's direction math reads clientWidth,
         which ignores transforms — scaling it would mis-center the dead zone. */
      .ejs_virtualGamepad_left {
        width: var(--ejs-dpad-size) !important;
        height: var(--ejs-dpad-size) !important;
      }
      /* Match the face-button zone's HEIGHT to the dpad zone so the L/R shoulders
         line up. Both zones share bottom:50px and the engine anchors the
         shoulders at top:-90 from each zone's top, so a taller left zone (the
         enlarged dpad) used to push L above R. Height only — leaving the width
         (and right:10px anchor) alone keeps the A/B horizontal layout intact. */
      .ejs_virtualGamepad_right {
        height: var(--ejs-dpad-size) !important;
      }
      /* Bigger face + Start/Select buttons. transform:scale grows them in place
         (around their own centre) so the engine's fixed per-system positions
         don't need re-tuning; a button press is a plain tap, so scaling doesn't
         skew it the way it would the dpad. */
      .ejs_virtualGamepad_button { transform: scale(var(--ejs-btn-scale)); }
      /* The center pills (Start/Select) overlap at the round-button scale, so
         scale them less. Comes AFTER the rule above (equal specificity) so it
         wins for these two ids. */
      .b_start, .b_select { transform: scale(var(--ejs-block-scale)); }
      /* Drop the Fast / Slow / Rewind hold-buttons — replaced by the one-tap
         fast-forward toggle below (added in JS on game start). */
      .b_speed_fast, .b_speed_slow, .b_speed_rewind { display: none !important; }
      /* The on-screen fast-forward toggle. Sits just ABOVE the face-button
         cluster on the right, out of the play area (it used to be top-center,
         over the game). Anchored to the controller band via the same vars that
         lift/size the pad, so it tracks them: the right zone's top edge is
         (parent bottom 50px + lift) + the zone's own bottom 50px + its height,
         and the gap var nudges the toggle above that. */
      .ff-toggle {
        position: absolute; right: var(--ejs-ff-right); z-index: 999;
        bottom: calc(
          100px + var(--ejs-gamepad-lift) + var(--ejs-dpad-size)
          + var(--ejs-ff-gap) + env(safe-area-inset-bottom, 0px)
        );
        min-width: 54px; height: 36px; line-height: 34px; padding: 0 10px;
        text-align: center; font: 600 16px system-ui, sans-serif; color: #e2e8f0;
        border: 1px solid #ccc; border-radius: 8px;
        background: rgba(255, 255, 255, 0.15);
        user-select: none; -webkit-user-select: none; cursor: pointer;
      }
      .ff-toggle.ff-active {
        background: rgba(56, 189, 248, 0.55); border-color: #38bdf8; color: #fff;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script>
      // Boots EmulatorJS from query params (core, rom, data). Lives in its own
      // page so the engine's window globals + teardown never touch the SPA — the
      // React side just drops this in an <iframe> and removes it to tear down.
      (function () {
        var p = new URLSearchParams(location.search);
        var core = p.get('core');
        var rom = p.get('rom');
        var name = p.get('name');
        var gid = p.get('gid'); // game id, for uploading save states
        var loadstate = p.get('loadstate'); // optional: resume into a saved state
        var data = p.get('data') || '/emulatorjs/';
        // Only allow a same-origin path or the official EmulatorJS CDN as the
        // engine source — never an arbitrary URL handed in via ?data=.
        if (!(data.charAt(0) === '/' || data.indexOf('https://cdn.emulatorjs.org/') === 0)) {
          data = '/emulatorjs/';
        }
        if (data.charAt(data.length - 1) !== '/') data += '/';
        if (!core || !rom) {
          document.body.innerHTML = '<p id="msg">Missing core or ROM.</p>';
          return;
        }
        window.EJS_player = '#game';
        window.EJS_core = core;
        window.EJS_gameUrl = rom;
        window.EJS_gameName = name || '';
        window.EJS_pathtodata = data;
        // Resume into a saved state, if one was requested (same-origin path only).
        if (loadstate && loadstate.charAt(0) === '/') {
          window.EJS_loadStateURL = loadstate;
        }
        // When the user saves a state in the in-game menu, push it (and its
        // screenshot) to the backend so it roams across devices + is backed up.
        // The event's `e.screenshot` is unusable: EmulatorJS v4.2.3 destructures
        // { screenshot } from takeScreenshot(), which actually resolves { blob },
        // so e.screenshot is always undefined (upstream bug). Capture the frame
        // ourselves from the engine instance instead. e = { state: Uint8Array }.
        function captureShot() {
          var emu = window.EJS_emulator;
          if (!emu || typeof emu.takeScreenshot !== 'function') return Promise.resolve(null);
          var cap = (emu.capture && emu.capture.photo) || {};
          return emu
            .takeScreenshot(cap.source, cap.format, cap.upscale)
            .then(function (r) { return r && r.blob ? r.blob : null; })
            .catch(function () { return null; });
        }
        window.EJS_onSaveState = function (e) {
          if (!gid || !e || !e.state) return;
          var state = e.state;
          captureShot().then(function (shot) {
            try {
              var fd = new FormData();
              fd.append('id', gid);
              fd.append('state', new Blob([state]));
              if (shot) fd.append('screenshot', shot, 'shot.png');
              fetch('/api/library/games/save-states', { method: 'POST', body: fd });
            } catch (err) {}
          });
        };
        // Add an on-screen fast-forward TOGGLE to the touch controls. The engine
        // only exposes fast-forward as a menu setting (plus a hold-button we hide
        // via CSS); this surfaces it as a one-tap on/off that reuses the engine's
        // own `fastForward` setting — so the speed/ratio configured in the menu is
        // respected and the state stays in sync with it. Added on game start
        // (when the controls + gameManager exist), touch devices only.
        window.EJS_onGameStart = function () {
          try {
            var emu = window.EJS_emulator;
            if (!emu || !emu.isMobile || !emu.elements || !emu.elements.parent) return;
            if (emu.elements.parent.querySelector('.ff-toggle')) return; // once per game
            var btn = document.createElement('div');
            btn.className = 'ff-toggle';
            btn.textContent = '⏩'; // ⏩
            btn.setAttribute('role', 'button');
            btn.setAttribute('aria-label', 'Toggle fast-forward');
            btn.setAttribute('aria-pressed', 'false');
            var fire = function (e) {
              e.preventDefault(); // touchstart preventDefault also suppresses the synthetic mouse event → no double toggle
              var on = !emu.isFastForward;
              emu.changeSettingOption('fastForward', on ? 'enabled' : 'disabled');
              btn.classList.toggle('ff-active', on);
              btn.setAttribute('aria-pressed', on ? 'true' : 'false');
            };
            btn.addEventListener('touchstart', fire);
            btn.addEventListener('mousedown', fire); // desktop / dev fallback
            emu.elements.parent.appendChild(btn);
          } catch (err) {}
        };
        // NOT EJS_startOnLoaded: auto-start gets paused immediately by iOS's
        // audio policy (the white screen + "Click to resume"). Letting the
        // engine show its own Play button means one clean tap starts it with
        // audio + focus already granted.
        // Keep save states in the browser (IndexedDB) by default instead of
        // downloading a .state file (which iOS can't open). The proper
        // cross-device sync of saves is a later phase (EJS_onSaveState hooks).
        window.EJS_defaultOptions = { 'save-state-location': 'browser' };
        // Keep keyboard/gamepad focus on the emulator so it doesn't pause as
        // soon as it loads inside the iframe.
        window.addEventListener('pointerdown', function () {
          try { window.focus(); } catch (e) {}
        });
        var s = document.createElement('script');
        s.src = data + 'loader.js';
        s.onerror = function () {
          document.body.innerHTML =
            '<p id="msg">Emulator engine not installed. Run ' +
            '<code>scripts/fetch-emulatorjs.sh</code> to download EmulatorJS into ' +
            '<code>frontend/public/emulatorjs/</code>, then rebuild the frontend — ' +
            'or point the player at the pinned CDN (see the script header).</p>';
        };
        document.body.appendChild(s);
      })();
    </script>
  </body>
</html>
