<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Library — Player</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
      #game { width: 100%; height: 100%; }
      #msg { color: #cbd5e1; font-family: system-ui, sans-serif; padding: 1.25rem; line-height: 1.5; }
      #msg code { background: #1e293b; padding: 0 0.3em; border-radius: 0.25em; }
      /* The engine styles its save/load notifications red; tone it down. */
      .ejs_message { color: #e2e8f0 !important; text-shadow: 0 1px 2px #000 !important; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script>
      // Boots EmulatorJS from query params (core, rom, data). Lives in its own
      // page so the engine's window globals + teardown never touch the SPA — the
      // React side just drops this in an <iframe> and removes it to tear down.
      //
      // The two-way contract with the parent (same-origin, so both are plain
      // property reads — no postMessage):
      //   in   window.parent.HQ_PLAYER_CONFIG  — engine config (set before the
      //        iframe is created). Lives in the app bundle, NOT here, so it can
      //        change without an ENGINE_VERSION bump + a re-download on every
      //        device. See src/lib/emuBridge.js.
      //   out  window.HQ = { version, emu, whenStarted } — the live engine.
      (function () {
        var p = new URLSearchParams(location.search);
        var core = p.get('core');
        var rom = p.get('rom');
        var name = p.get('name');
        var gid = p.get('gid'); // game id, for uploading save states
        var loadstate = p.get('loadstate'); // optional: resume into a saved state
        var data = p.get('data') || '/emulatorjs/';
        // Only allow a same-origin path or the official EmulatorJS CDN as the
        // engine source — never an arbitrary URL handed in via ?data=.
        if (!((data.charAt(0) === '/' && data.charAt(1) !== '/') || data.indexOf('https://cdn.emulatorjs.org/') === 0)) {
          data = '/emulatorjs/';
        }
        if (data.charAt(data.length - 1) !== '/') data += '/';
        if (!core || !rom) {
          document.body.innerHTML = '<p id="msg">Missing core or ROM.</p>';
          return;
        }
        window.EJS_player = '#game';
        window.EJS_core = core;
        window.EJS_gameName = name || '';
        window.EJS_pathtodata = data;
        // A stable game id so the engine keys its browser save states off it,
        // not off EJS_gameUrl (which becomes a per-session blob: URL below).
        window.EJS_gameID = gid || name || rom;

        // --- config in, from the parent -------------------------------------
        // The app sets HQ_PLAYER_CONFIG before creating the iframe, so it's
        // always there by the time this runs. The fallbacks below are what makes
        // opening /emulator.html directly (no parent) still play a game.
        var cfg = {};
        try {
          if (window.parent && window.parent !== window) cfg = window.parent.HQ_PLAYER_CONFIG || {};
        } catch (e) {}
        window.EJS_defaultOptions = cfg.defaultOptions || { 'save-state-location': 'browser' };
        if (cfg.buttons) window.EJS_Buttons = cfg.buttons;
        if (cfg.hideSettings) window.EJS_hideSettings = cfg.hideSettings;
        if (cfg.defaultControls) window.EJS_defaultControls = cfg.defaultControls;
        if (cfg.disableLocalStorage) window.EJS_disableLocalStorage = true;

        // --- the engine out, to the parent ----------------------------------
        // whenStarted resolves once the game is actually RUNNING (the engine's
        // own Start button has been tapped). The parent waits on it before it
        // puts anything over the player: that tap has to reach this document or
        // iOS never unlocks audio.
        var started;
        window.HQ = {
          version: 1,
          get emu() {
            return window.EJS_emulator || null;
          },
          whenStarted: new Promise(function (resolve) {
            started = resolve;
          }),
        };

        // --- in-game battery save (SRAM) persistence -----------------------
        // EmulatorJS does NOT persist the game's own save (e.g. Pokemon's "Save")
        // across sessions — it only fires a "saveSaveFiles" event with the .sav
        // bytes. So we own it: seed the emulator with the saved SRAM on start
        // (so "Continue" works), and capture every write back to a local cache +
        // the server (roams + survives offline). Keyed by game id.
        var sramServerUrl = '/api/library/games/sram?id=' + encodeURIComponent(gid || '');
        var sramCacheKey = '/__game-sram/' + encodeURIComponent(gid || '');
        function readSramCache() {
          return caches.open('hq-game-saves')
            .then(function (c) { return c.match(sramCacheKey); })
            .then(function (r) { return r ? r.arrayBuffer() : null; })
            .catch(function () { return null; });
        }
        // The SRAM to seed the game with: the latest on THIS device (local cache)
        // if any, else whatever the server has (a new device / first time).
        function loadSram() {
          if (!gid) return Promise.resolve(null);
          return readSramCache().then(function (local) {
            if (local) return local;
            return fetch(sramServerUrl).then(function (r) { return r.ok ? r.arrayBuffer() : null; }).catch(function () { return null; });
          });
        }
        var lastSramUpload = 0;
        function persistSram(bytes) {
          if (!gid || !bytes || !bytes.length) return;
          var blob = new Blob([bytes]);
          // Always cache locally (cheap; survives reloads + works offline).
          try {
            caches.open('hq-game-saves').then(function (c) { c.put(sramCacheKey, new Response(blob)); });
          } catch (e) {}
          // Upload to the server, throttled (the event can fire on an interval).
          var now = Date.now();
          if (now - lastSramUpload > 15000) {
            lastSramUpload = now;
            try {
              var fd = new FormData();
              fd.append('id', gid);
              fd.append('sram', blob, 'sram.bin');
              fetch(sramServerUrl, { method: 'POST', body: fd });
            } catch (e) {}
          }
        }
        // Kick off the seed fetch early (parallel with the ROM).
        var pendingSram = loadSram();
        // Capture the live SRAM ourselves on a timer + when the page is hidden
        // (don't rely on EmulatorJS's own save interval/exit, which is unreliable
        // — the iframe can be torn down before it fires). getSaveFile(true)
        // flushes the core's battery RAM to the FS, then reads it.
        var lastSramSig = '';
        function captureSram(emu) {
          try {
            var sav = emu.gameManager.getSaveFile(true);
            if (!sav || !sav.length) return;
            // Cheap sampled checksum (every 64 bytes) to skip unchanged SRAM.
            var sum = sav.length >>> 0;
            for (var i = 0; i < sav.length; i += 64) sum = (sum * 31 + sav[i]) >>> 0;
            var sig = '' + sum;
            if (sig === lastSramSig) return; // unchanged → skip
            lastSramSig = sig;
            persistSram(sav);
          } catch (e) {}
        }
        function startSramCapture(emu) {
          setInterval(function () { captureSram(emu); }, 5000);
          document.addEventListener('visibilitychange', function () { if (document.hidden) captureSram(emu); });
          window.addEventListener('pagehide', function () { captureSram(emu); });
        }
        // When the user saves a state in the in-game menu, push it (and its
        // screenshot) to the backend so it roams across devices + is backed up.
        // The event's `e.screenshot` is unusable: EmulatorJS v4.2.3 destructures
        // { screenshot } from takeScreenshot(), which actually resolves { blob },
        // so e.screenshot is always undefined (upstream bug). Capture the frame
        // ourselves from the engine instance instead. e = { state: Uint8Array }.
        function captureShot() {
          var emu = window.EJS_emulator;
          if (!emu || typeof emu.takeScreenshot !== 'function') return Promise.resolve(null);
          var cap = (emu.capture && emu.capture.photo) || {};
          return emu
            .takeScreenshot(cap.source, cap.format, cap.upscale)
            .then(function (r) { return r && r.blob ? r.blob : null; })
            .catch(function () { return null; });
        }
        window.EJS_onSaveState = function (e) {
          if (!gid || !e || !e.state) return;
          var state = e.state;
          // Store the latest state locally (one per game) so reopening the game
          // resumes it — including offline, where the server upload below can't
          // reach. This is what makes "resume where you left off" work offline.
          try {
            caches.open('hq-game-saves').then(function (c) {
              c.put('/__game-save/' + encodeURIComponent(gid), new Response(new Blob([state])));
            });
          } catch (err) {}
          captureShot().then(function (shot) {
            try {
              var fd = new FormData();
              fd.append('id', gid);
              fd.append('state', new Blob([state]));
              if (shot) fd.append('screenshot', shot, 'shot.png');
              fetch('/api/library/games/save-states', { method: 'POST', body: fd });
            } catch (err) {}
          });
        };
        // The app takes over once the game is actually running: it grabs the
        // engine (see window.HQ above) and draws its own controls over the top.
        window.EJS_onGameStart = function () {
          var emu = window.EJS_emulator;
          // Hand the running engine to the parent (see window.HQ above). Fired
          // here, not on load: the game is only playable once Start is tapped.
          try {
            started(emu);
          } catch (e) {}
          // Seed the game's battery save (SRAM) + capture future writes — all
          // platforms, so "Continue" loads your save. Inject first, then start
          // capturing, so a capture can't overwrite the seed with empty data.
          try {
            if (emu && emu.gameManager) {
              pendingSram.then(function (buf) {
                if (buf && buf.byteLength) {
                  try {
                    emu.gameManager.FS.writeFile(emu.gameManager.getSaveFilePath(), new Uint8Array(buf));
                    emu.gameManager.loadSaveFiles();
                  } catch (e) {}
                }
                startSramCapture(emu); // begin reliable polling capture
              });
            }
          } catch (e) {}
        };
        // NOT EJS_startOnLoaded: auto-start gets paused immediately by iOS's
        // audio policy (the white screen + "Click to resume"). Letting the
        // engine show its own Play button means one clean tap starts it with
        // audio + focus already granted.
        //
        // Keep keyboard/gamepad focus on the emulator so it doesn't pause as
        // soon as it loads inside the iframe.
        window.addEventListener('pointerdown', function () {
          try { window.focus(); } catch (e) {}
        });
        // Boot the engine once the ROM (and the save state we're resuming, if
        // any) are in hand. We fetch them OURSELVES (a plain fetch the service
        // worker serves from cache when the game is downloaded for offline) and
        // hand EmulatorJS blob: URLs — so the engine reads them locally instead
        // of via its own XMLHttpRequest, which a service worker stalls on iOS
        // Safari for a large binary (the "Download Game Data" hang).
        function bootEngine(gameUrl, stateUrl) {
          window.EJS_gameUrl = gameUrl;
          if (stateUrl) window.EJS_loadStateURL = stateUrl;
          var s = document.createElement('script');
          s.src = data + 'loader.js';
          s.onerror = function () {
            document.body.innerHTML =
              '<p id="msg">Emulator engine not installed. Run ' +
              '<code>scripts/fetch-emulatorjs.sh</code> to download EmulatorJS into ' +
              '<code>frontend/public/emulatorjs/</code>, then rebuild the frontend — ' +
              'or point the player at the pinned CDN (see the script header).</p>';
            // Settle the contract: there will never be a game. Without this the
            // parent waits on whenStarted forever and shows a spinner over the
            // top of the message above.
            try { started(null); } catch (e) {}
          };
          document.body.appendChild(s);
        }
        // Pre-fetch a same-origin URL as a blob: URL; fall back to the raw URL on
        // any failure (so online play is unaffected if a fetch hiccups).
        function asBlobUrl(u) {
          if (!u || u.charAt(0) !== '/') return Promise.resolve(u || null);
          return fetch(u)
            .then(function (r) { if (!r.ok) throw new Error(r.status); return r.blob(); })
            .then(function (b) { return URL.createObjectURL(b); })
            .catch(function () { return u; });
        }
        // Resume the MOST RECENT state: a locally-captured save (your latest,
        // including any made offline) if one exists, otherwise the download-time
        // save passed in via ?loadstate. Read straight from the saves cache (not
        // via a URL the SW would have to serve).
        function localSaveBlobUrl() {
          return caches
            .open('hq-game-saves')
            .then(function (c) { return c.match('/__game-save/' + encodeURIComponent(gid)); })
            .then(function (r) { return r ? r.blob() : null; })
            .then(function (b) { return b ? URL.createObjectURL(b) : null; })
            .catch(function () { return null; });
        }
        Promise.all([
          asBlobUrl(rom),
          localSaveBlobUrl().then(function (local) { return local || asBlobUrl(loadstate); }),
        ]).then(function (r) {
          bootEngine(r[0] || rom, r[1]);
        });
      })();
    </script>
  </body>
</html>
