<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Library — Player</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
      #game { width: 100%; height: 100%; }
      #msg { color: #cbd5e1; font-family: system-ui, sans-serif; padding: 1.25rem; line-height: 1.5; }
      #msg code { background: #1e293b; padding: 0 0.3em; border-radius: 0.25em; }
      /* The engine styles its save/load notifications red; tone it down. */
      .ejs_message { color: #e2e8f0 !important; text-shadow: 0 1px 2px #000 !important; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script>
      // Boots EmulatorJS from query params (core, rom, data). Lives in its own
      // page so the engine's window globals + teardown never touch the SPA — the
      // React side just drops this in an <iframe> and removes it to tear down.
      //
      // The two-way contract with the parent (same-origin, so both are plain
      // property reads — no postMessage):
      //   in   window.parent.HQ_PLAYER_CONFIG  — engine config (set before the
      //        iframe is created). Lives in the app bundle, NOT here, so it can
      //        change without an ENGINE_VERSION bump + a re-download on every
      //        device. See src/lib/emuBridge.js.
      //   out  window.HQ = { version, emu, whenStarted } — the live engine.
      (function () {
        var p = new URLSearchParams(location.search);
        var core = p.get('core');
        var rom = p.get('rom');
        var name = p.get('name');
        var gid = p.get('gid'); // game id, for uploading save states
        var loadstate = p.get('loadstate'); // optional: resume into a saved state
        var data = p.get('data') || '/emulatorjs/';
        // Only allow a same-origin path or the official EmulatorJS CDN as the
        // engine source — never an arbitrary URL handed in via ?data=.
        if (!((data.charAt(0) === '/' && data.charAt(1) !== '/') || data.indexOf('https://cdn.emulatorjs.org/') === 0)) {
          data = '/emulatorjs/';
        }
        if (data.charAt(data.length - 1) !== '/') data += '/';
        if (!core || !rom) {
          document.body.innerHTML = '<p id="msg">Missing core or ROM.</p>';
          return;
        }
        // --- make the canvas readable (save-state screenshots) ----------------
        // A WebGL canvas throws its drawing buffer away the instant the frame is
        // composited, unless it was created with preserveDrawingBuffer. The engine
        // never sets it, so reading the canvas back later gives a perfectly valid,
        // perfectly BLACK image — which is what every save-state thumbnail was.
        //
        // This has to run BEFORE the core creates its context, and the core is built
        // by Emscripten inside this document. Doing it from the parent left it to
        // timing; doing it here, first thing, leaves nothing to chance.
        (function () {
          var proto = window.HTMLCanvasElement && window.HTMLCanvasElement.prototype;
          if (!proto || proto.__hqPreserved) return;
          var original = proto.getContext;
          proto.getContext = function (type, attrs) {
            if (type === 'webgl' || type === 'webgl2' || type === 'experimental-webgl') {
              attrs = attrs || {};
              attrs.preserveDrawingBuffer = true;
              return original.call(this, type, attrs);
            }
            return original.call(this, type, attrs);
          };
          proto.__hqPreserved = true;
        })();

        window.EJS_player = '#game';
        window.EJS_core = core;
        window.EJS_gameName = name || '';
        window.EJS_pathtodata = data;
        // A stable game id so the engine keys its browser save states off it,
        // not off EJS_gameUrl (which becomes a per-session blob: URL below).
        window.EJS_gameID = gid || name || rom;

        // --- config in, from the parent -------------------------------------
        // The app sets HQ_PLAYER_CONFIG before creating the iframe, so it's
        // always there by the time this runs. The fallbacks below are what makes
        // opening /emulator.html directly (no parent) still play a game.
        var cfg = {};
        try {
          if (window.parent && window.parent !== window) cfg = window.parent.HQ_PLAYER_CONFIG || {};
        } catch (e) {}
        window.EJS_defaultOptions = cfg.defaultOptions || { 'save-state-location': 'browser' };
        if (cfg.buttons) window.EJS_Buttons = cfg.buttons;
        if (cfg.hideSettings) window.EJS_hideSettings = cfg.hideSettings;
        if (cfg.defaultControls) window.EJS_defaultControls = cfg.defaultControls;
        if (cfg.disableLocalStorage) window.EJS_disableLocalStorage = true;
        // The start screen. The engine keeps its own Start button — that tap has to
        // land in this document or iOS never unlocks audio — but everything about how
        // it looks comes from the app.
        if (cfg.alignStartButton) window.EJS_alignStartButton = cfg.alignStartButton;
        if (cfg.startButtonName) window.EJS_startButtonName = cfg.startButtonName;
        if (cfg.backgroundImage) window.EJS_backgroundImage = cfg.backgroundImage;
        if (cfg.backgroundBlur) window.EJS_backgroundBlur = true;
        if (cfg.backgroundColor) window.EJS_backgroundColor = cfg.backgroundColor;

        // --- the engine out, to the parent ----------------------------------
        // whenStarted resolves once the game is actually RUNNING (the engine's
        // own Start button has been tapped). The parent waits on it before it
        // puts anything over the player: that tap has to reach this document or
        // iOS never unlocks audio.
        var started;
        window.HQ = {
          version: 1,
          get emu() {
            return window.EJS_emulator || null;
          },
          whenStarted: new Promise(function (resolve) {
            started = resolve;
          }),
        };

        // The app takes over once the game is actually running: it grabs the
        // engine (see window.HQ above) and draws its own controls over the top.
        window.EJS_onGameStart = function () {
          // Hand the running engine to the parent (see window.HQ above). Fired here,
          // not on load: the game is only playable once Start is tapped.
          //
          // The battery save is deliberately NOT handled in here any more. This
          // document is the thing that gets destroyed when you quit, and every write
          // it starts dies with it — so the parent owns saves now (lib/gameSaves.js).
          try {
            started(window.EJS_emulator);
          } catch (e) {}
        };
        // NOT EJS_startOnLoaded: auto-start gets paused immediately by iOS's
        // audio policy (the white screen + "Click to resume"). Letting the
        // engine show its own Play button means one clean tap starts it with
        // audio + focus already granted.
        //
        // Keep keyboard/gamepad focus on the emulator so it doesn't pause as
        // soon as it loads inside the iframe.
        window.addEventListener('pointerdown', function () {
          try { window.focus(); } catch (e) {}
        });
        // Boot the engine once the ROM (and the save state we're resuming, if
        // any) are in hand. We fetch them OURSELVES (a plain fetch the service
        // worker serves from cache when the game is downloaded for offline) and
        // hand EmulatorJS blob: URLs — so the engine reads them locally instead
        // of via its own XMLHttpRequest, which a service worker stalls on iOS
        // Safari for a large binary (the "Download Game Data" hang).
        function bootEngine(gameUrl, stateUrl) {
          window.EJS_gameUrl = gameUrl;
          if (stateUrl) window.EJS_loadStateURL = stateUrl;
          var s = document.createElement('script');
          s.src = data + 'loader.js';
          s.onerror = function () {
            document.body.innerHTML =
              '<p id="msg">Emulator engine not installed. Run ' +
              '<code>scripts/fetch-emulatorjs.sh</code> to download EmulatorJS into ' +
              '<code>frontend/public/emulatorjs/</code>, then rebuild the frontend — ' +
              'or point the player at the pinned CDN (see the script header).</p>';
            // Settle the contract: there will never be a game. Without this the
            // parent waits on whenStarted forever and shows a spinner over the
            // top of the message above.
            try { started(null); } catch (e) {}
          };
          document.body.appendChild(s);
        }
        // Pre-fetch a same-origin URL as a blob: URL; fall back to the raw URL on
        // any failure (so online play is unaffected if a fetch hiccups).
        function asBlobUrl(u) {
          if (!u || u.charAt(0) !== '/') return Promise.resolve(u || null);
          return fetch(u)
            .then(function (r) { if (!r.ok) throw new Error(r.status); return r.blob(); })
            .then(function (b) { return URL.createObjectURL(b); })
            .catch(function () { return u; });
        }
        // Resume the MOST RECENT state: a locally-captured save (your latest,
        // including any made offline) if one exists, otherwise the download-time
        // save passed in via ?loadstate. Read straight from the saves cache (not
        // via a URL the SW would have to serve).
        function localSaveBlobUrl() {
          return caches
            .open('hq-game-saves')
            .then(function (c) { return c.match('/__game-save/' + encodeURIComponent(gid)); })
            .then(function (r) { return r ? r.blob() : null; })
            .then(function (b) { return b ? URL.createObjectURL(b) : null; })
            .catch(function () { return null; });
        }
        Promise.all([
          asBlobUrl(rom),
          localSaveBlobUrl().then(function (local) { return local || asBlobUrl(loadstate); }),
        ]).then(function (r) {
          bootEngine(r[0] || rom, r[1]);
        });
      })();
    </script>
  </body>
</html>
