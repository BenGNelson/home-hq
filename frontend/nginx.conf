# nginx config for the production frontend.
# - Serves the built SPA, falling back to index.html for client-side routes.
# - Reverse-proxies /api to the backend container (one origin, no CORS).
# - Sets cache headers so the app updates promptly while still caching the
#   content-hashed assets aggressively.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API → backend container. "backend" resolves on the compose network.
    # The /api prefix is preserved (backend routes live under /api).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # The service worker and the HTML shell must never be cached by the browser,
    # or users would be stuck on a stale app after a deploy. The SW itself
    # manages updating the precached, content-hashed assets.
    #
    # Content-Security-Policy + security headers are set on the app shell. The
    # shell is served by TWO locations: the explicit `= /index.html` route AND
    # the `/` try_files fallback below (which is what a fresh load of a deep
    # client-side route like /storage or /plex actually hits). nginx's
    # `add_header` does NOT inherit into a location that defines its OWN
    # add_header, and it does NOT inherit "down" into the fallback either — so to
    # cover every HTML response the headers must be repeated in BOTH the
    # `= /index.html` block and the `location /` block. (Defining them once at
    # server scope would silently drop them from the asset/cache-control
    # locations that set their own add_header; per-shell-location is the safe
    # scope.) The shared directives are kept identical in both places.
    #
    # CSP notes: the ebook reader (foliate-js) renders books in a blob: iframe
    # that — due to a WebKit bug — must run with allow-scripts, so a CSP is the
    # real boundary there; the blob iframe inherits this policy. The directives
    # allow: our inline theme script ('unsafe-inline'); blob: iframes/images/
    # fonts/styles for the reader; same-origin everything else (API, PWA worker,
    # the emulator.html frame). frame-ancestors 'self' blocks clickjacking
    # (others embedding us) without needing X-Frame-Options. (EmulatorJS runs in
    # its own same-origin emulator.html document, which has its own response and
    # isn't governed by this policy.)
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline' blob:; img-src 'self' data: blob:; font-src 'self' data: blob:; connect-src 'self' blob:; frame-src 'self' blob:; child-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }
    # The emulator host page boots the engine from query params; keep it fresh so
    # config changes (game name, save-state defaults) land without a stale cache.
    location = /emulator.html {
        add_header Cache-Control "no-cache";
    }

    # .mjs ES-module files (e.g. the PDF.js worker) must be served as JavaScript
    # or strict browsers (Chromium) refuse to load them as module scripts
    # ("Expected a JavaScript module ... responded with application/octet-stream").
    # nginx's mime.types doesn't reliably map .mjs, so set it explicitly. Still a
    # content-hashed asset → cache hard. (Regex location, so it wins over /assets/.)
    location ~* \.mjs$ {
        default_type text/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Content-hashed build assets can be cached for a long time.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Self-hosted EmulatorJS engine/cores (pinned version) — large and static,
    # so cache them hard. Served straight from disk (not a SPA route).
    location /emulatorjs/ {
        add_header Cache-Control "public, max-age=2592000";
    }

    # SPA: serve the requested file if it exists, else hand back index.html
    # so React Router can handle the route.
    #
    # A fresh load of any deep route (e.g. /storage, /plex) falls through here
    # and is served the index.html shell — so the CSP + security headers MUST be
    # repeated on this location too (add_header does not inherit from the
    # `= /index.html` block). Kept byte-identical to the values above. Cache the
    # shell as no-cache for the same reason as `= /index.html` (no stale app).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline' blob:; img-src 'self' data: blob:; font-src 'self' data: blob:; connect-src 'self' blob:; frame-src 'self' blob:; child-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }
}
