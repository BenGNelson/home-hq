# Fully-pinned dependency resolution actually installed in the image, so rebuilds
# (incl. the documented bare-metal restore) are reproducible instead of resolving
# the loose floors in requirements.txt against whatever is current on PyPI.
#
# requirements.txt is the human-readable source of intent (commented, loose
# floors). To regenerate this lock after intentionally bumping a dep there:
#   docker compose run --rm --no-deps backend pip freeze > backend/requirements.lock
